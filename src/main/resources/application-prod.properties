$content = @'
# Conexão segura com o Neon PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Dialeto PostgreSQL explicito (obrigatorio para evitar inferencia incorreta)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Em producao, nunca recriamos tabelas automaticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Garante que o schema.sql de dev NAO seja executado em producao
spring.sql.init.mode=never

# Pool de conexao otimizado para Neon (free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# Chaves injetadas via variaveis de ambiente na plataforma Render
tecloja.jwt.secret=${JWT_SECRET_KEY}
tecloja.jwt.expiration=86400000
'@

# Salva como UTF-8 sem BOM
$utf8NoBom = New-Object System.Text.UTF8Encoding $false
[System.IO.File]::WriteAllText("src/main/resources/application-prod.properties", $content, $utf8NoBom)